steps:
  # ── 1. Build Docker image ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/vtempe-server:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/vtempe-server:latest
      - .

  # ── 2. Push to Container Registry ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: PushTag
    args: ['push', 'gcr.io/$PROJECT_ID/vtempe-server:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    id: PushLatest
    args: ['push', 'gcr.io/$PROJECT_ID/vtempe-server:latest']

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - vtempe-server
      - --image=gcr.io/$PROJECT_ID/vtempe-server:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-secrets=APP_SECRET=APP_SECRET:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,OPENROUTER_FREE_API_KEY=OPENROUTER_FREE_API_KEY:latest,OPENROUTER_BASE_URL=OPENROUTER_BASE_URL:latest,OPENROUTER_SITE_URL=OPENROUTER_SITE_URL:latest,OPENROUTER_APP_NAME=OPENROUTER_APP_NAME:latest,OPENROUTER_MODEL=OPENROUTER_MODEL:latest,OPENROUTER_BOOTSTRAP_MODEL=OPENROUTER_BOOTSTRAP_MODEL:latest,OPENROUTER_FREE_MODEL=OPENROUTER_FREE_MODEL:latest,AI_QUALITY_MODE=AI_QUALITY_MODE:latest,AI_PREFER_DECOMPOSED_BUNDLE_FIRST=AI_PREFER_DECOMPOSED_BUNDLE_FIRST:latest,AI_DECOMPOSE_BUNDLE_ON_FAILURE=AI_DECOMPOSE_BUNDLE_ON_FAILURE:latest,AI_LLM_TIMEOUT_MS=AI_LLM_TIMEOUT_MS:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,DATABASE_URL=DATABASE_URL:latest,DATABASE_USER=DATABASE_USER:latest,DATABASE_PASSWORD=DATABASE_PASSWORD:latest

images:
  - 'gcr.io/$PROJECT_ID/vtempe-server:$COMMIT_SHA'

substitutions:
  _DEPLOY_REGION: europe-west1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
