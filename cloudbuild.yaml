steps:
  # ── 1. Build Docker image ────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      - build
      - --cache-from=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME:latest
      - -t
      - $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME:$COMMIT_SHA
      - -t
      - $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME:latest
      - .

  # ── 2. Push to Artifact Registry ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - push
      - --all-tags
      - $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - vtempe-server
      - --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-secrets=APP_SECRET=APP_SECRET:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,OPENROUTER_FREE_API_KEY=OPENROUTER_FREE_API_KEY:latest

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME:$COMMIT_SHA'

substitutions:
  _AR_HOSTNAME: europe-docker.pkg.dev    # change to us-docker / asia-docker as needed
  _DEPLOY_REGION: europe-west1           # change to your preferred region
  _REPO_NAME: vtempe

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8             # faster builds
